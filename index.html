<<script>
    const apiKey = 'RTOB33Z3DOSWCFNI'; 
    // We use DIA (the ETF) because the Dow Index (DJI) is restricted on free keys
    const symbol = 'DIA'; 

    async function updateStatus() {
        const answerEl = document.getElementById('answer');
        const verdictEl = document.getElementById('verdict');
        const marketEl = document.getElementById('market-data');

        try {
            const response = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${apiKey}`);
            const data = await response.json();
            
            // If the API returns a "Note" (rate limit) or is empty
            if (!data["Global Quote"] || !data["Global Quote"]["05. price"]) {
               marketEl.innerText = "Market data currently unavailable (probably redacted).";
               return;
            }

            // Get the DIA price and multiply by 100 to get the Dow estimate
            const diaPrice = parseFloat(data["Global Quote"]["05. price"]);
            const price = diaPrice * 100;

            if (price >= 50000) {
                answerEl.innerText = "YES";
                answerEl.style.color = "#28a745"; // Success Green
                verdictEl.innerText = "Please consider talking about this rather than the Epstein Files.";
            } else {
                answerEl.innerText = "NO";
                answerEl.style.color = "#dc3545"; // Failure Red
                verdictEl.innerText = "Feel free to talk about the Epstein Files.";
            }

            marketEl.innerText = `Estimated Dow Jones: ${price.toLocaleString('en-US', {minimumFractionDigits: 2})}`;

        } catch (error) {
            marketEl.innerText = "Market data currently unavailable.";
        }
    }

    updateStatus();
</script>
