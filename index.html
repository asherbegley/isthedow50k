<style>
    body {
        background-color: #f8f9fa;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: "Helvetica Neue", Arial, sans-serif;
        text-align: center;
    }
    #answer {
        font-size: 30vw;
        font-weight: 900;
        margin: 0;
        line-height: 0.9;
        /* Set Red as the default color */
        color: #dc3545; 
    }
    #verdict {
        font-size: 2.5rem;
        font-weight: 600;
        margin-top: 10px;
        color: #333;
    }
    #market-data {
        font-size: 1.2rem;
        color: #777;
        margin-top: 20px;
    }
    .footer {
        margin-top: 60px;
        padding: 20px;
        border-top: 1px solid #ddd;
        color: #999;
        font-size: 0.9rem;
        max-width: 500px;
    }
</style>

<body>
    <div id="answer">NO</div>
    <div id="verdict">Feel free to talk about the Epstein Files.</div>
    <div id="market-data">Fetching live DJI price...</div>

    <div class="footer">
        "But the stock market is doing so well." <br>
        — <strong>Pam Bondi</strong>, US Attorney General
    </div>

    <script>
        const apiKey = 'RTOB33Z3DOSWCFNI'; 
        const symbol = 'DJI';

        async function updateStatus() {
            const answerEl = document.getElementById('answer');
            const verdictEl = document.getElementById('verdict');
            const marketEl = document.getElementById('market-data');

            try {
                const response = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${apiKey}`);
                const data = await response.json();
                
                // Safety check for API limits
                if (!data["Global Quote"]) {
                   marketEl.innerText = "Error fetching the data (it was probably redacted).";
                   return;
                }

                const price = parseFloat(data["Global Quote"]["05. price"]);

                if (price >= 50000) {
                    answerEl.innerText = "YES";
                    answerEl.style.color = "#28a745"; // Changes to Green
                    verdictEl.innerText = "Please consider talking about this rather than the Epstein File.";
                } 
                // No 'else' needed for color because it's already red in CSS

                marketEl.innerText = `Dow Jones Industrial Average: ${price.toLocaleString('en-US', {minimumFractionDigits: 2})}`;

            } catch (error) {
                marketEl.innerText = "Market data currently unavailable.";
            }
        }

        updateStatus();
    </script>
</body>
